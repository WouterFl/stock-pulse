<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Offline — Stock Pulse</title>
    <style>
        :root { color-scheme: dark; }
        * { box-sizing: border-box; }
        body {
            margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center;
            background: #0f172a; color: #e2e8f0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            text-align: center; padding: 1.5rem;
        }
        .card { max-width: 22rem; }
        .dot { width: 64px; height: 64px; margin: 0 auto 1.25rem; border-radius: 9999px;
            background: rgba(16,185,129,.15); display: flex; align-items: center; justify-content: center; }
        h1 { font-size: 1.25rem; margin: 0 0 .5rem; }
        p { color: #94a3b8; line-height: 1.5; margin: 0 0 1.5rem; }
        button { background: #10b981; color: #04221a; border: 0; padding: .6rem 1.2rem;
            border-radius: .6rem; font-weight: 600; cursor: pointer; }
    </style>
</head>
<body>
    <div class="card">
        <div class="dot">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#10b981" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M3 13h4l3 7 4-14 3 7h4"/>
            </svg>
        </div>
        <h1>Geen verbinding</h1>
        <p>Stock Pulse toont alleen live data en kan offline geen koersen of alerts laden. Controleer je internetverbinding.</p>
        <button onclick="location.reload()">Opnieuw proberen</button>
    </div>
</body>
</html>
